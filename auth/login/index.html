<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in | Minicafe</title>
    <link rel="stylesheet" href="/css/variables.css" />
    <link rel="stylesheet" href="/auth/login/index.css" />
  </head>
  <body>
    <main class="auth-shell login-shell">
      <section class="auth-visual login-visual" aria-labelledby="page-title">
        <a class="brand" href="/">Minicafe</a>
        <div class="visual-copy">
          <p class="eyebrow">Welcome back</p>
          <h1 id="page-title">
            <span>다시 만나는</span>
            <span>나의 계절</span>
          </h1>
          <p>회원은 장바구니와 주문을, 관리자는 메뉴와 주문 흐름을 차분하게 이어서 확인할 수 있어요.</p>
        </div>
</section>

      <section class="auth-panel login-panel" aria-label="Login form">
        <div class="panel-intro">
          <p class="eyebrow dark">Log in</p>
          <h2>로그인</h2>
          <p>이용할 계정 종류를 선택하고 Minicafe로 들어가세요.</p>
        </div>

        <div class="role-tabs" role="tablist" aria-label="Account role">
          <button id="customer-tab" class="is-active" type="button" data-role="customer">회원</button>
          <button id="admin-tab" type="button" data-role="admin">관리자</button>
        </div>

        <form id="login-form" class="auth-form">
          <input id="role-input" type="hidden" value="customer" />
          <label class="field">
            <span>이메일</span>
            <input id="email-input" type="email" autocomplete="email" required placeholder="you@example.com" />
          </label>
          <label class="field">
            <span>비밀번호</span>
            <input id="password-input" type="password" autocomplete="current-password" required placeholder="비밀번호 입력" />
          </label>
          <p id="form-message" class="form-message" role="alert" aria-live="polite"></p>
          <button class="primary-button" type="submit">로그인하기</button>
        </form>

        <div class="auth-note">
          <p id="helper-text">처음 방문했나요?</p>
          <a id="signup-link" href="/auth/signup/">회원가입하기</a>
        </div>
      </section>
    </main>

    <script src="/js/data.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/auth/login/index.js"></script>
  </body>
</html>
