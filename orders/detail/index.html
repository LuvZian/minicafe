<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Detail | Minicafe</title>
    <link rel="stylesheet" href="/css/variables.css" />
    <link rel="stylesheet" href="/orders/detail/index.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/">Minicafe</a>
      <nav class="site-nav" aria-label="Customer navigation"></nav>
    </header>

    <main class="page-shell">
      <a class="back-link" href="/orders/list/">주문 목록으로</a>

      <section id="order-detail" class="detail-layout" hidden>
        <aside class="receipt-card" aria-label="Order summary">
          <p class="eyebrow dark">Receipt</p>
          <h1 id="order-title">Order</h1>
          <dl class="receipt-list">
            <div>
              <dt>상태</dt>
              <dd id="order-status"></dd>
            </div>
            <div>
              <dt>주문 시간</dt>
              <dd id="order-date"></dd>
            </div>
            <div>
              <dt>메뉴 수</dt>
              <dd id="order-count"></dd>
            </div>
            <div>
              <dt>합계</dt>
              <dd id="order-total"></dd>
            </div>
          </dl>
          <a class="primary-link" href="/menus/list/">메뉴 더 보기</a>
        </aside>

        <section class="items-panel" aria-label="주문한 메뉴 items">
          <div class="panel-head">
            <div>
              <p class="eyebrow dark">메뉴 수</p>
              <h2>주문한 메뉴</h2>
            </div>
          </div>
          <div id="items-list" class="items-list"></div>
        </section>
      </section>

      <section id="not-found" class="not-found" hidden>
        <h1>주문을 찾을 수 없어요</h1>
        <p>주문이 삭제되었거나 링크가 올바르지 않을 수 있어요.</p>
        <a href="/orders/list/">주문 목록 보기</a>
      </section>
    </main>

    <script src="/js/data.js"></script>
    <script src="/js/supabase-config.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/orders/detail/index.js"></script>
  </body>
</html>
