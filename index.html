<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minicafe</title>
    <link rel="stylesheet" href="/css/variables.css" />
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/">Minicafe</a>
      <nav class="site-nav" aria-label="고객 메뉴"></nav>
    </header>

    <main class="page-shell">
      <section class="home-hero" aria-labelledby="page-title">
        <div class="hero-copy-block">
          <h1 id="page-title" class="sr-only">Minicafe 계절 슬라이드</h1>
          <div id="hero-slides" class="hero-slides"></div>
          <div class="hero-slider-ui" aria-label="계절 슬라이드">
            <button id="hero-prev" class="hero-arrow" type="button" aria-label="이전 슬라이드">&lsaquo;</button>
            <div id="hero-dots" class="hero-dots" role="tablist" aria-label="계절 슬라이드 선택"></div>
            <button id="hero-next" class="hero-arrow" type="button" aria-label="다음 슬라이드">&rsaquo;</button>
          </div>
        </div>
        <aside class="hero-card" aria-label="오늘의 계절 추천">
          <p class="eyebrow dark">오늘의 추천</p>
          <div id="today-visual" class="today-visual" aria-hidden="true"></div>
          <h2 id="today-name">준비 중</h2>
          <p id="today-description">오늘 어울리는 계절 메뉴를 고르고 있어요.</p>
          <div class="today-footer">
            <strong id="today-price">0원</strong>
            <a id="today-link" class="detail-link" href="/menus/list/">자세히 보기</a>
          </div>
        </aside>
      </section>

      <section class="summary-grid" aria-label="Minicafe 바로가기">
        <article class="summary-card">
          <p class="eyebrow dark">메뉴</p>
          <h2>계절 메뉴 둘러보기</h2>
          <p>로그인 전에도 메뉴는 편하게 볼 수 있어요.</p>
          <a class="secondary-link" href="/menus/list/">메뉴 보기</a>
        </article>
        <article class="summary-card">
          <p class="eyebrow dark">로그인</p>
          <h2>주문은 로그인 후에</h2>
          <p>장바구니와 주문 내역은 회원 계정에서 안전하게 관리돼요.</p>
          <a class="secondary-link" href="/auth/login/">로그인</a>
        </article>
        <article class="summary-card">
          <p class="eyebrow dark">회원가입</p>
          <h2>처음이라면 회원가입</h2>
          <p>나만의 계절 찬장과 주문 기록을 만들 수 있어요.</p>
          <a class="secondary-link" href="/auth/signup/">회원가입</a>
        </article>
      </section>

      <section class="featured-section" aria-labelledby="featured-title">
        <div class="section-head">
          <div>
            <p id="featured-eyebrow" class="eyebrow dark">계절 추천</p>
            <h2 id="featured-title">오늘의 계절 메뉴</h2>
          </div>
          <a class="text-link" href="/menus/list/">전체 메뉴</a>
        </div>
        <div id="featured-grid" class="featured-grid"></div>
      </section>
    </main>

    <script src="/js/data.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/index.js"></script>
  </body>
</html>
