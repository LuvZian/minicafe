<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu | Minicafe</title>
    <link rel="stylesheet" href="/css/variables.css" />
    <link rel="stylesheet" href="/menus/list/index.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/">Minicafe</a>
      <nav class="site-nav" aria-label="Customer navigation"></nav>
    </header>

    <main class="page-shell">
      <section class="menu-hero" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">Seasonal menu</p>
          <h1 id="page-title">계절별 음료, 디저트, 굿즈를 한눈에</h1>
          <p class="hero-copy">봄, 여름, 가을, 겨울의 분위기에 맞춘 메뉴를 골라보세요.</p>
        </div>
        <a class="hero-action" href="/basket/list/">View basket</a>
      </section>

      <section class="menu-toolbar" aria-label="Menu filters">
        <label class="search-field">
          <span class="sr-only">Search menu</span>
          <input id="search-input" type="search" placeholder="Search menu" autocomplete="off" />
        </label>
        <div id="category-tabs" class="category-tabs" role="tablist" aria-label="Categories"></div>
      </section>

      <section aria-live="polite">
        <div class="result-line">
          <span id="result-count">0 menus</span>
        </div>
        <div id="menu-grid" class="menu-grid"></div>
        <div id="empty-state" class="empty-state" hidden>
          <h2>No menu found</h2>
          <p>다른 계절이나 검색어로 다시 찾아보세요.</p>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="/js/data.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/menus/list/index.js"></script>
  </body>
</html>
