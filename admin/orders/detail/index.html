<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주문 상세 | Minicafe</title>
    <link rel="stylesheet" href="/css/variables.css" />
    <link rel="stylesheet" href="/admin/orders/detail/index.css" />
  </head>
  <body>
    <header class="admin-header">
      <a class="brand" href="/">Minicafe</a>
      <nav class="admin-nav" aria-label="관리자 메뉴"></nav>
    </header>

    <main class="page-shell">
      <a class="back-link" href="/admin/orders/list/">주문 목록으로 돌아가기</a>

      <section id="order-detail" class="detail-layout" hidden>
        <aside class="status-panel" aria-label="주문 상태">
          <p class="eyebrow dark">주문표</p>
          <h1 id="order-title">주문</h1>
          <p id="order-season" class="season-note"></p>
          <dl class="summary-list">
            <div>
              <dt>상태</dt>
              <dd id="order-status"></dd>
            </div>
            <div>
              <dt>주문 시간</dt>
              <dd id="order-date"></dd>
            </div>
            <div>
              <dt>메뉴 수량</dt>
              <dd id="order-count"></dd>
            </div>
            <div>
              <dt>총 금액</dt>
              <dd id="order-total"></dd>
            </div>
          </dl>
          <label class="field">
            <span>상태 변경</span>
            <select id="status-select"></select>
          </label>
          <button id="save-status" class="primary-button" type="button">상태 저장</button>
          <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
        </aside>

        <section class="items-panel" aria-label="주문 메뉴">
          <div class="panel-head">
            <div>
              <p class="eyebrow dark">담긴 메뉴</p>
              <h2>고객 주문 구성</h2>
            </div>
          </div>
          <div id="items-list" class="items-list"></div>
        </section>
      </section>

      <section id="not-found" class="not-found" hidden>
        <h1>주문을 찾을 수 없어요</h1>
        <p>주문이 삭제되었거나 링크가 올바르지 않을 수 있어요.</p>
        <a href="/admin/orders/list/">주문 목록 보기</a>
      </section>
    </main>

    <script src="/js/data.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/admin/orders/detail/index.js"></script>
  </body>
</html>
