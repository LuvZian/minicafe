<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Menu | Minicafe</title>
    <link rel="stylesheet" href="../../css/variables.css" />
    <link rel="stylesheet" href="./create.css" />
  </head>
  <body>
    <header class="admin-header">
      <a class="brand" href="../../index.html">Minicafe</a>
      <nav class="admin-nav" aria-label="Admin navigation">
        <a href="../index.html">Dashboard</a>
        <a href="./list.html" aria-current="page">Menus</a>
        <a href="../orders/list.html">Orders</a>
      </nav>
    </header>

    <main class="page-shell">
      <a class="back-link" href="./list.html">Back to list</a>
      <section class="form-shell" aria-labelledby="page-title">
        <div class="form-intro">
          <p class="eyebrow">Create</p>
          <h1 id="page-title">Add menu</h1>
          <p>Register a new menu item with a clear name, category, and price.</p>
        </div>

        <form id="menu-form" class="menu-form">
          <label class="field">
            <span>Name</span>
            <input id="name" name="name" type="text" required maxlength="60" placeholder="Slow Morning Latte" />
          </label>

          <label class="field">
            <span>Category</span>
            <select id="category" name="category" required></select>
          </label>

          <label class="field">
            <span>Price</span>
            <input id="price" name="price" type="number" min="0" step="100" required placeholder="4800" />
          </label>

          <label class="field field-wide">
            <span>Image URL</span>
            <input id="image" name="image" type="url" placeholder="https://example.com/menu.jpg" />
          </label>

          <label class="field field-wide">
            <span>Description</span>
            <textarea id="description" name="description" rows="5" required maxlength="180" placeholder="Describe the menu in a calm, simple way."></textarea>
          </label>

          <p id="form-error" class="form-error" role="alert" hidden></p>

          <div class="form-actions">
            <button class="primary-button" type="submit">Save menu</button>
            <a class="secondary-link" href="./list.html">Cancel</a>
          </div>
        </form>
      </section>
    </main>

    <script src="../../js/data.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="./create.js"></script>
  </body>
</html>
