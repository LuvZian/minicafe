<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Menu | Minicafe</title>
    <link rel="stylesheet" href="../../css/variables.css" />
    <link rel="stylesheet" href="./list.css" />
  </head>
  <body>
    <header class="admin-header">
      <a class="brand" href="../../index.html">Minicafe</a>
      <nav class="admin-nav" aria-label="Admin navigation">
        <a href="../index.html">Dashboard</a>
        <a href="./list.html" aria-current="page">Menus</a>
        <a href="../orders/list.html">Orders</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="page-head">
        <div>
          <p class="eyebrow">Admin</p>
          <h1>Menu management</h1>
          <p class="head-copy">Keep the cafe menu tidy, calm, and easy to browse.</p>
        </div>
        <a class="primary-link" href="./create.html">Add menu</a>
      </section>

      <section class="stats-grid" aria-label="Menu summary">
        <article>
          <span>Total menus</span>
          <strong id="total-count">0</strong>
        </article>
        <article>
          <span>Categories</span>
          <strong id="category-count">0</strong>
        </article>
      </section>

      <section class="toolbar" aria-label="Menu filters">
        <label class="field search-field">
          <span>Search</span>
          <input id="search-input" type="search" placeholder="Name, category, description" autocomplete="off" />
        </label>
        <label class="field">
          <span>Category</span>
          <select id="category-filter"></select>
        </label>
      </section>

      <section class="menu-panel" aria-live="polite">
        <div class="panel-head">
          <h2>Menus</h2>
          <span id="result-count">0 items</span>
        </div>
        <div id="menu-list" class="menu-list"></div>
        <div id="empty-state" class="empty-state" hidden>
          <h2>No menus found</h2>
          <p>Try a different keyword or add a new menu item.</p>
          <a href="./create.html">Add menu</a>
        </div>
      </section>
    </main>

    <script src="../../js/data.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="./list.js"></script>
  </body>
</html>
